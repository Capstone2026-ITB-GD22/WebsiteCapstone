<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Interaktif - Capstone WebGIS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        /* --- PENGATURAN WARNA --- */
        :root {
            --maroon: #6B1E2D;
            --beige: #F5E9DA;
            --cream: #FFF8F0;
            --terracotta: #C56A4A;
            --brown: #2F1B16;
            --off-white: #FAF6F1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--beige);
            height: 100vh; /* Agar peta memenuhi layar tanpa scroll berlebih */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Mengunci scroll halaman utama */
        }

        /* --- NAVBAR --- */
        .navbar {
            background-color: var(--maroon);
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000; /* Z-index tinggi agar selalu di atas peta */
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #D7F2FA 55%, #A3C940 55%, #6A911C 100%);
            position: relative;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            top: 14px;
            width: 24px;
            height: 10px;
            background-color: white;
            border-radius: 10px;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 50px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            position: relative;
            padding-bottom: 5px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: 0;
            left: 0;
            background-color: var(--cream);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-links a:hover::after { width: 100%; }

        /* --- WEBGIS LAYOUT --- */
        .webgis-wrapper {
            flex: 1; /* Mengisi sisa tinggi layar di bawah navbar */
            display: flex;
            height: calc(100vh - 90px);
        }

        /* --- PANEL KONTROL KIRI (SIDEBAR) --- */
        .sidebar {
            width: 350px;
            background-color: var(--cream);
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 500;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            background-color: var(--brown);
            color: var(--cream);
            padding: 20px 25px;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .sidebar-content {
            padding: 25px;
            flex: 1;
        }

        .control-group {
            margin-bottom: 30px;
        }

        .control-group h3 {
            color: var(--terracotta);
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(197, 106, 74, 0.2);
            padding-bottom: 8px;
        }

        /* Styling Checkbox Custom */
        .layer-option {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            color: var(--brown);
            font-weight: 600;
            font-size: 15px;
        }

        .layer-option input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--maroon);
        }

        /* Legenda */
        .legend-box {
            background-color: white;
            border: 1px solid rgba(47, 27, 22, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 10px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .legend-tinggi { background-color: #D35D6E; }
        .legend-sedang { background-color: #E2A76F; }
        .legend-rendah { background-color: #A3C940; }

        /* --- AREA PETA UTAMA --- */
        #map {
            flex: 1; /* Mengisi sisa lebar layar */
            background-color: #e5e3df; /* Warna dasar abu peta */
            z-index: 100;
        }

        /* Kustomisasi kontrol zoom Leaflet agar sesuai tema */
        .leaflet-bar a {
            color: var(--brown) !important;
        }
        .leaflet-bar a:hover {
            background-color: var(--beige) !important;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <div class="logo-icon"></div>
            <div class="nav-title">Nama Tim</div>
        </div>
        <div class="nav-links">
            <a href="index.html">Beranda</a>
            <a href="index.html#tujuan-section">Tujuan</a>
            <a href="index.html#edukasi-section">Edukasi</a>
            <a href="#" class="active-link" style="border-bottom: 3px solid var(--cream);">WebGIS</a>
            <a href="tim.html">Tim</a>
        </div>
    </div>

    <div class="webgis-wrapper">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Panel Analisis Spasial</h2>
            </div>
            
            <div class="sidebar-content">
                
                <div class="control-group">
                    <h3>Layer Dasar (Basemap)</h3>
                    <label class="layer-option">
                        <input type="radio" name="basemap" value="osm" checked onchange="changeBasemap(this)"> OpenStreetMap
                    </label>
                    <label class="layer-option">
                        <input type="radio" name="basemap" value="satellite" onchange="changeBasemap(this)"> Citra Satelit (ESRI)
                    </label>
                </div>

                <div class="control-group">
                    <h3>Peta Ancaman Multi-Hazard</h3>
                    <label class="layer-option">
                        <input type="checkbox" id="layer-gempa" onchange="toggleLayer('gempa', this.checked)"> Risiko Gempa Bumi
                    </label>
                    <label class="layer-option">
                        <input type="checkbox" id="layer-banjir" onchange="toggleLayer('banjir', this.checked)"> Risiko Banjir
                    </label>
                    <label class="layer-option">
                        <input type="checkbox" id="layer-longsor" onchange="toggleLayer('longsor', this.checked)"> Risiko Tanah Longsor
                    </label>
                </div>

                <div class="control-group">
                    <h3>Legenda Risiko</h3>
                    <div class="legend-box">
                        <div class="legend-item">
                            <div class="legend-color legend-tinggi"></div> Risiko Tinggi
                        </div>
                        <div class="legend-item">
                            <div class="legend-color legend-sedang"></div> Risiko Sedang
                        </div>
                        <div class="legend-item">
                            <div class="legend-color legend-rendah"></div> Risiko Rendah
                        </div>
                    </div>
                    <p style="font-size: 12px; margin-top: 15px; color: #888;">
                        *Resolusi tingkat persil (1:5.000). Data simulasi untuk pratinjau antarmuka.
                    </p>
                </div>

            </div>
        </div>

        <div id="map"></div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 1. INISIALISASI PETA
        // Mengarahkan tampilan awal peta ke koordinat Kota Bandung dengan zoom level 13
        const map = L.map('map').setView([-6.9147, 107.6098], 13);

        // 2. DEFINISI BASEMAP (Peta Dasar)
        // Basemap 1: OpenStreetMap (Default)
        const basemapOSM = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Basemap 2: ESRI World Imagery (Satelit)
        const basemapSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri'
        });

        // Fungsi untuk mengganti basemap dari radio button di sidebar
        function changeBasemap(radio) {
            if (radio.value === 'osm') {
                map.removeLayer(basemapSatellite);
                basemapOSM.addTo(map);
            } else if (radio.value === 'satellite') {
                map.removeLayer(basemapOSM);
                basemapSatellite.addTo(map);
            }
        }

        // 3. PERSIAPAN DATA LAYER (DUMMY/SIMULASI)
        // Karena data GeoJSON aslimu belum dimasukkan, kita gunakan poligon sederhana
        // berwarna sebagai contoh/simulasi agar fungsi interaktifnya terlihat bekerja.

        // Simulasi Zona Risiko Gempa (Merah transparan di area Utara/Sesar Lembang)
        const zonaGempa = L.circle([-6.8200, 107.6100], {
            color: '#D35D6E',
            fillColor: '#D35D6E',
            fillOpacity: 0.5,
            radius: 3500
        }).bindPopup("<b>Zona Risiko Gempa Tinggi</b><br>Kedekatan dengan Sesar Lembang.");

        // Simulasi Zona Risiko Banjir (Biru transparan di area Selatan/Cekungan)
        const zonaBanjir = L.circle([-6.9600, 107.6300], {
            color: '#1A5276',
            fillColor: '#1A5276',
            fillOpacity: 0.5,
            radius: 4000
        }).bindPopup("<b>Zona Risiko Banjir Tinggi</b><br>Area Cekungan Bandung Selatan.");

        // Simulasi Zona Risiko Longsor (Coklat/Oranye di lereng)
        const zonaLongsor = L.circle([-6.8600, 107.6800], {
            color: '#E2A76F',
            fillColor: '#E2A76F',
            fillOpacity: 0.5,
            radius: 2500
        }).bindPopup("<b>Zona Risiko Longsor</b><br>Kemiringan lereng curam & jenis tanah vulkanik.");

        // 4. FUNGSI UNTUK MENGAKTIFKAN/MEMATIKAN LAYER DARI CHECKBOX SIDEBAR
        function toggleLayer(jenis, isChecked) {
            let layerTarget;

            if (jenis === 'gempa') layerTarget = zonaGempa;
            if (jenis === 'banjir') layerTarget = zonaBanjir;
            if (jenis === 'longsor') layerTarget = zonaLongsor;

            if (isChecked) {
                // Jika dicentang, tambahkan layer ke peta
                layerTarget.addTo(map);
            } else {
                // Jika centang dihilangkan, hapus layer dari peta
                map.removeLayer(layerTarget);
            }
        }

        /* * PANDUAN UNTUKMU NANTI:
         * Untuk memasukkan data aslimu (Shapefile yang diconvert ke GeoJSON), 
         * kamu bisa menggunakan script Leaflet AJAX atau fetch API seperti ini:
         * * fetch('data_persil_risiko.geojson')
         * .then(response => response.json())
         * .then(data => {
         * const layerPersil = L.geoJSON(data, { style: fungsiStylingMu });
         * // Masukkan layerPersil ini ke fungsi toggleLayer di atas
         * });
         */
    </script>
</body>
</html>
